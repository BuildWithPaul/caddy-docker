services:
  # ── VitaminChecker ──────────────────────────────────────────
  vitaminchecker:
    build:
      context: ../VitaminChecker
      dockerfile: Dockerfile
    container_name: vitaminchecker
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - APPLICATION_ROOT=/vitaminchecker
    volumes:
      - ../VitaminChecker/uploads:/app/uploads

  # ── ChouChouAlerte ──────────────────────────────────────────
  chouchoualerte:
    build:
      context: ../ChouChouAlerte
      dockerfile: Dockerfile
    container_name: chouchoualerte
    restart: unless-stopped
    env_file:
      - ../ChouChouAlerte/.env
    environment:
      - APPLICATION_ROOT=/chouchoualerte
    volumes:
      - chouchoualerte-data:/app/data

  # ── Caddy reverse proxy ──────────────────────────────────────
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ENABLE_ACCESS_LOGS=${ENABLE_ACCESS_LOGS:-ERROR}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - vitaminchecker
      - chouchoualerte

volumes:
  caddy_data:
  caddy_config:
  chouchoualerte-data: